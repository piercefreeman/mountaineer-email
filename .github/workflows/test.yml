name: test

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled, unlabeled]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - run: make ci-lint

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: make test

  full-build:
    needs: [lint, test]
    if: >-
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'pull_request' &&
      contains(toJson(github.event.pull_request.labels), 'full-build'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mountaineer_email/views/package-lock.json
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Install frontend dependencies
        run: npm ci --prefix mountaineer_email/views

      - name: Update version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: uv run .github/scripts/update_version.py ${{ github.ref_name }}

      - name: Build email artifacts
        run: uv run build-email

      - name: Build sdist and wheel
        run: uv build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  release:
    needs: [full-build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
